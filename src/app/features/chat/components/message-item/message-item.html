<div
  class="flex mb-4"
  [class.justify-end]="message.role === 'user'"
>

  <div
    class="
      max-w-[75%]
      rounded-2xl
      px-4
      py-3
      text-sm
      whitespace-pre-wrap
    "

    [class.bg-blue-500]="message.role === 'user'"
    [class.text-white]="message.role === 'user'"

    [class.bg-zinc-100]="message.role === 'assistant'"
    [class.dark:bg-zinc-800]="message.role === 'assistant'"
  >

    {{ message.content }}

  </div>

</div>
